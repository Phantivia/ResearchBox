<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("researchbox:uiLocale");
          var locale = stored === "en" || stored === "zh" ? stored : null;
          if (!locale) {
            var langs =
              navigator.languages && navigator.languages.length
                ? navigator.languages
                : [navigator.language || "en"];
            locale = "en";
            for (var i = 0; i < langs.length; i++) {
              var tag = String(langs[i]).trim().toLowerCase();
              if (tag === "en" || tag.indexOf("en-") === 0) {
                locale = "en";
                break;
              }
              if (tag === "zh" || tag.indexOf("zh-") === 0) {
                locale = "zh";
                break;
              }
            }
          }
          document.documentElement.lang = locale === "zh" ? "zh-CN" : "en";
        } catch (_error) {
          /* localStorage may be unavailable in private mode */
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ResearchBox - Academic Paper Research Tool" />
    <meta name="author" content="Phantivia (PhantAIStudio)" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" type="image/svg+xml" href="./mini_logo.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="./icons/icon-64x64.png" />
    <title>ResearchBox</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
